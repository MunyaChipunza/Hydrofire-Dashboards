name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-dashboard-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh dashboard_data.json from workbook link
        env:
          WORKBOOK_URL: ${{ secrets.WORKBOOK_URL }}
        run: python scripts/refresh_dashboard_data.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to publish."
            exit 0
          fi
          git commit -m "Update dashboard data"
          git push
