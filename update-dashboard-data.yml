name: Update Dashboard Data

on:
  repository_dispatch:
    types:
      - dashboard_update

jobs:
  update-dashboard-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write dashboard_data.json
        env:
          DASHBOARD_JSON: ${{ toJson(github.event.client_payload.dashboard_data) }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["DASHBOARD_JSON"])
          Path("dashboard_data.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to publish."
            exit 0
          fi
          git commit -m "Update dashboard data"
          git push
